    <h1>Switch Statement</h1>


    <button class="btn btn-info" onclick="teamRank()">Rank</button>

<script>
    function teamRank(){
        var message = "";//empty


        switch(true){
            case (rank <= "1st"): message = "Champions!"; break;
            case (rank <= "2nd"): message = "Champions!"; break;
            case (rank <= "3rd"): message = "Champions!"; break;
